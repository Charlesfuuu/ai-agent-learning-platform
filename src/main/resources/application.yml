server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ai-agent-learning-platform

  # 静态资源缓存配置（开发环境禁用缓存）
  web:
    resources:
      cache:
        period: 0
        cachecontrol:
          no-cache: true
          no-store: true
          must-revalidate: true

  # 数据库配置
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ai_learning?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # JPA / Hibernate 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 20
          time_zone: Asia/Shanghai

# Ollama 本地 AI 配置（免费）
ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model-name: ${OLLAMA_MODEL_NAME:llama3.2:3b}
  temperature: ${OLLAMA_TEMPERATURE:0.7}
  timeout: ${OLLAMA_TIMEOUT:60}

# 日志配置
logging:
  level:
    com.ailearn: INFO
    dev.langchain4j: DEBUG
