<!DOCTYPE html>
<html>
<head>
    <title>и°ғиҜ•е·Ҙе…·</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        button { margin: 10px; padding: 10px 20px; }
        .result { background: #f5f5f5; padding: 10px; margin: 10px 0; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>йҮҚж–°з”ҹжҲҗеҠҹиғҪи°ғиҜ•е·Ҙе…·</h1>

    <button onclick="checkMessages()">жЈҖжҹҘж¶ҲжҒҜе…ғзҙ </button>
    <button onclick="checkAttributes()">жЈҖжҹҘ data-user-message еұһжҖ§</button>
    <button onclick="checkFunctions()">жЈҖжҹҘеҮҪж•°еҸҜз”ЁжҖ§</button>

    <div id="results"></div>

    <script>
        function log(message, isError = false) {
            const div = document.createElement('div');
            div.className = 'result ' + (isError ? 'error' : 'success');
            div.textContent = message;
            document.getElementById('results').appendChild(div);
        }

        function checkMessages() {
            document.getElementById('results').innerHTML = '';

            // жү“ејҖдё»йЎөйқў
            const mainWindow = window.open('http://localhost:8080', 'mainWindow');

            setTimeout(() => {
                try {
                    const doc = mainWindow.document;
                    const userMessages = doc.querySelectorAll('.message.user');
                    const assistantMessages = doc.querySelectorAll('.message.assistant');

                    log(`жүҫеҲ° ${userMessages.length} жқЎз”ЁжҲ·ж¶ҲжҒҜ`);
                    log(`жүҫеҲ° ${assistantMessages.length} жқЎ AI ж¶ҲжҒҜ`);

                    userMessages.forEach((msg, index) => {
                        const hasAttr = msg.hasAttribute('data-user-message');
                        const attrValue = msg.getAttribute('data-user-message');
                        log(`з”ЁжҲ·ж¶ҲжҒҜ #${index + 1}: ${hasAttr ? 'вң“ жңүеұһжҖ§' : 'вң— зјәе°‘еұһжҖ§'} - ${attrValue ? attrValue.substring(0, 50) + '...' : 'ж— еҖј'}`, !hasAttr);
                    });

                } catch (e) {
                    log('й”ҷиҜҜ: ' + e.message, true);
                }
            }, 2000);
        }

        function checkAttributes() {
            document.getElementById('results').innerHTML = '';
            const mainWindow = window.open('http://localhost:8080', 'mainWindow');

            setTimeout(() => {
                try {
                    const doc = mainWindow.document;
                    const messages = doc.querySelectorAll('.message');

                    log(`жҖ»е…ұ ${messages.length} жқЎж¶ҲжҒҜ`);

                    messages.forEach((msg, index) => {
                        const isUser = msg.classList.contains('user');
                        const isAssistant = msg.classList.contains('assistant');
                        const hasUserMsgAttr = msg.hasAttribute('data-user-message');
                        const hasRegenBtn = msg.querySelector('.regenerate-btn') !== null;
                        const hasEditBtn = msg.querySelector('.edit-btn') !== null;

                        log(`ж¶ҲжҒҜ #${index + 1}: ${isUser ? 'USER' : isAssistant ? 'ASSISTANT' : 'UNKNOWN'} | data-user-message=${hasUserMsgAttr} | йҮҚж–°з”ҹжҲҗжҢүй’®=${hasRegenBtn} | зј–иҫ‘жҢүй’®=${hasEditBtn}`);
                    });
                } catch (e) {
                    log('й”ҷиҜҜ: ' + e.message, true);
                }
            }, 2000);
        }

        function checkFunctions() {
            document.getElementById('results').innerHTML = '';
            const mainWindow = window.open('http://localhost:8080', 'mainWindow');

            setTimeout(() => {
                try {
                    const win = mainWindow;

                    log('жЈҖжҹҘе…ЁеұҖеҮҪж•°...');
                    log(`UIController: ${typeof win.UIController !== 'undefined' ? 'вң“ еӯҳеңЁ' : 'вң— дёҚеӯҳеңЁ'}`, typeof win.UIController === 'undefined');
                    log(`SessionManager: ${typeof win.SessionManager !== 'undefined' ? 'вң“ еӯҳеңЁ' : 'вң— дёҚеӯҳеңЁ'}`, typeof win.SessionManager === 'undefined');
                    log(`sendChatWithData: ${typeof win.sendChatWithData !== 'undefined' ? 'вң“ еӯҳеңЁ' : 'вң— дёҚеӯҳеңЁ'}`, typeof win.sendChatWithData === 'undefined');

                    if (typeof win.UIController !== 'undefined') {
                        log(`UIController.regenerateMessage: ${typeof win.UIController.regenerateMessage === 'function' ? 'вң“ жҳҜеҮҪж•°' : 'вң— дёҚжҳҜеҮҪж•°'}`, typeof win.UIController.regenerateMessage !== 'function');
                    }

                    if (typeof win.SessionManager !== 'undefined') {
                        log(`SessionManager.getCurrentSessionId: ${typeof win.SessionManager.getCurrentSessionId === 'function' ? 'вң“ жҳҜеҮҪж•°' : 'вң— дёҚжҳҜеҮҪж•°'}`, typeof win.SessionManager.getCurrentSessionId !== 'function');

                        const sessionId = win.SessionManager.getCurrentSessionId();
                        log(`еҪ“еүҚдјҡиҜқID: ${sessionId || '(з©ә)'}`);
                    }
                } catch (e) {
                    log('й”ҷиҜҜ: ' + e.message, true);
                }
            }, 2000);
        }
    </script>
</body>
</html>
