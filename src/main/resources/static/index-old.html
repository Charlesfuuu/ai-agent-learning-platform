<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title data-i18n="ui.title">AI Agent 学习助手</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Crimson+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Color Palette - Tech Futuristic */
            --bg-primary: #0a0e17;
            --bg-secondary: #121826;
            --bg-tertiary: #1a2235;
            --accent-primary: #00d4ff;
            --accent-secondary: #7c3aed;
            --accent-glow: rgba(0, 212, 255, 0.3);
            --text-primary: #e8eaed;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border-subtle: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --warning: #f59e0b;

            /* Fonts */
            --font-display: 'Crimson Pro', serif;
            --font-mono: 'JetBrains Mono', monospace;
            --font-body: system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-body);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 20% 50%, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
            animation: bgRotate 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bgRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            z-index: 1;
        }

        /* Header with glass effect */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 40px;
            background: rgba(18, 24, 38, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            margin-bottom: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            margin: 0;
        }

        /* Language Switcher */
        .language-switcher {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .language-switcher label {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .language-switcher select {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 8px 16px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .language-switcher select:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .language-switcher select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        /* Section Cards */
        .section {
            background: rgba(18, 24, 38, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }

        .section:nth-child(2) { animation-delay: 0.1s; }
        .section:nth-child(3) { animation-delay: 0.2s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .section-icon {
            font-size: 2rem;
            filter: drop-shadow(0 0 10px currentColor);
        }

        h2 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Input Areas */
        textarea {
            width: 100%;
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 2px solid var(--border-subtle);
            border-radius: 12px;
            padding: 16px 20px;
            font-family: var(--font-mono);
            font-size: 0.95rem;
            line-height: 1.6;
            resize: vertical;
            transition: all 0.3s ease;
            margin-bottom: 16px;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px var(--accent-glow),
                        0 8px 24px rgba(0, 0, 0, 0.3);
            transform: translateY(-2px);
        }

        textarea::placeholder {
            color: var(--text-muted);
            font-style: italic;
        }

        /* Button with gradient and glow */
        button {
            position: relative;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px 32px;
            font-family: var(--font-mono);
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px var(--accent-glow),
                        0 10px 25px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        /* Response boxes */
        .response {
            background: var(--bg-primary);
            border: 2px solid var(--border-subtle);
            border-left: 4px solid var(--accent-primary);
            border-radius: 12px;
            padding: 24px;
            margin-top: 20px;
            white-space: pre-wrap;
            font-family: var(--font-body);
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text-primary);
            max-height: 600px;
            overflow-y: auto;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .response::-webkit-scrollbar {
            width: 8px;
        }

        .response::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 4px;
        }

        .response::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 4px;
        }

        /* Loading animation */
        .response.loading {
            position: relative;
            color: var(--text-secondary);
            font-style: italic;
        }

        .response.loading::after {
            content: '';
            position: absolute;
            right: 20px;
            top: 50%;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-subtle);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Divider with glow */
        hr {
            border: none;
            height: 1px;
            background: linear-gradient(
                90deg,
                transparent,
                var(--border-subtle),
                transparent
            );
            margin: 40px 0;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 20px 16px;
            }

            .header {
                flex-direction: column;
                gap: 20px;
                padding: 24px;
                text-align: center;
            }

            h1 {
                font-size: 2rem;
            }

            .section {
                padding: 24px;
            }

            h2 {
                font-size: 1.5rem;
            }
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Focus visible for keyboard navigation */
        *:focus-visible {
            outline: 2px solid var(--accent-primary);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 data-i18n="ui.title">AI Agent 学习助手</h1>
            <div class="language-switcher">
                <label data-i18n="ui.language.label">语言</label>
                <select id="languageSelect" onchange="switchLanguage()">
                    <option value="zh-CN" data-i18n="ui.language.chinese">中文</option>
                    <option value="en-US" data-i18n="ui.language.english">English</option>
                </select>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <span class="section-icon">💬</span>
                <h2 data-i18n="ui.chat.header">对话学习</h2>
            </div>
            <textarea
                id="chatInput"
                rows="4"
                placeholder="输入你的问题...（Enter 换行，Ctrl+Enter 发送）"
                data-i18n="ui.chat.placeholder"
                data-i18n-attr="placeholder"
                aria-label="Chat input"></textarea>
            <button onclick="sendChat()" data-i18n="ui.chat.sendButton">发送 (Ctrl+Enter)</button>
            <div id="chatResponse" class="response" style="display:none;"></div>
        </div>

        <div class="section">
            <div class="section-header">
                <span class="section-icon">🔍</span>
                <h2 data-i18n="ui.codereview.header">代码审查</h2>
            </div>
            <textarea
                id="codeInput"
                rows="12"
                placeholder="粘贴你的 Java 代码..."
                data-i18n="ui.codereview.placeholder"
                data-i18n-attr="placeholder"
                aria-label="Code input"></textarea>
            <button onclick="reviewCode()" data-i18n="ui.codereview.reviewButton">审查代码</button>
            <div id="codeResponse" class="response" style="display:none;"></div>
        </div>
    </div>

    <script src="/js/i18n.js"></script>
    <script>
        // Initialize i18n and apply translations
        document.addEventListener('DOMContentLoaded', function() {
            const currentLocale = I18n.init();
            document.getElementById('languageSelect').value = currentLocale;
            I18n.updatePageTranslations();

            const chatInput = document.getElementById('chatInput');
            const codeInput = document.getElementById('codeInput');

            // Chat input: Ctrl+Enter or Cmd+Enter to send
            chatInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    sendChat();
                }
            });

            // Code input: Ctrl+Enter or Cmd+Enter to review
            codeInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    reviewCode();
                }
            });
        });

        function switchLanguage() {
            const newLocale = document.getElementById('languageSelect').value;
            I18n.setLocale(newLocale);
            I18n.updatePageTranslations();
            document.title = I18n.translate('ui.title');
        }

        async function sendChat() {
            const input = document.getElementById('chatInput');
            const responseDiv = document.getElementById('chatResponse');

            const message = input.value.trim();
            if (!message) {
                alert(I18n.translate('ui.alert.emptyQuestion'));
                return;
            }

            responseDiv.style.display = 'block';
            responseDiv.className = 'response loading';
            responseDiv.textContent = I18n.translate('ui.chat.thinking');

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept-Language': I18n.getLocale()
                    },
                    body: JSON.stringify({
                        sessionId: 'web-session',
                        message: message
                    })
                });

                const data = await response.json();
                responseDiv.className = 'response';
                responseDiv.textContent = data.response;
            } catch (error) {
                responseDiv.className = 'response';
                responseDiv.textContent = I18n.translate('ui.chat.error') + error.message;
            }
        }

        async function reviewCode() {
            const input = document.getElementById('codeInput');
            const responseDiv = document.getElementById('codeResponse');

            const code = input.value.trim();
            if (!code) {
                alert(I18n.translate('ui.alert.emptyCode'));
                return;
            }

            responseDiv.style.display = 'block';
            responseDiv.className = 'response loading';
            responseDiv.textContent = I18n.translate('ui.codereview.analyzing');

            try {
                const response = await fetch('/api/code/review', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept-Language': I18n.getLocale()
                    },
                    body: JSON.stringify({
                        code: code,
                        language: 'java'
                    })
                });

                const data = await response.json();
                responseDiv.className = 'response';
                responseDiv.textContent = data.feedback;
            } catch (error) {
                responseDiv.className = 'response';
                responseDiv.textContent = I18n.translate('ui.codereview.error') + error.message;
            }
        }
    </script>
</body>
</html>
