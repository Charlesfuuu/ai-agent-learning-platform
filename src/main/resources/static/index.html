<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title data-i18n="ui.title">AI Agent 学习助手</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Crimson+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Color Palette - Tech Futuristic */
            --bg-primary: #0a0e17;
            --bg-secondary: #121826;
            --bg-tertiary: #1a2235;
            --accent-primary: #00d4ff;
            --accent-secondary: #7c3aed;
            --accent-glow: rgba(0, 212, 255, 0.3);
            --text-primary: #e8eaed;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border-subtle: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --warning: #f59e0b;
            --sidebar-width: 300px;

            /* Fonts */
            --font-display: 'Crimson Pro', serif;
            --font-mono: 'JetBrains Mono', monospace;
            --font-body: system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-body);
            line-height: 1.6;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 20% 50%, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
            animation: bgRotate 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bgRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* App layout */
        .app-layout {
            position: relative;
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            height: 100vh;
            z-index: 1;
        }

        /* Sidebar */
        .sidebar {
            background: rgba(18, 24, 38, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .sidebar-header h3 {
            font-family: var(--font-display);
            font-size: 1.2rem;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .new-session-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .new-session-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .session-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .session-list-container::-webkit-scrollbar {
            width: 6px;
        }

        .session-list-container::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 3px;
        }

        .session-group {
            margin-bottom: 20px;
        }

        .session-group-title {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 8px 12px;
        }

        .session-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 4px;
        }

        .session-item:hover {
            background: rgba(0, 212, 255, 0.1);
        }

        .session-item.active {
            background: rgba(0, 212, 255, 0.2);
            border-left: 3px solid var(--accent-primary);
        }

        .session-item-content {
            flex: 1;
            min-width: 0;
        }

        .session-title {
            font-size: 0.9rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .session-delete {
            opacity: 0;
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            padding: 4px;
            transition: opacity 0.2s;
        }

        .session-item:hover .session-delete {
            opacity: 1;
        }

        .session-delete:hover {
            transform: scale(1.2);
        }

        .session-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Main content */
        .main-content {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(18, 24, 38, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-primary);
        }

        h1 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .language-switcher {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .language-switcher label {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .language-switcher select {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 8px 16px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .language-switcher select:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* Content area */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 20px 30px;
        }

        /* Chat display */
        .chat-display {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(18, 24, 38, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
        }

        .chat-display::-webkit-scrollbar {
            width: 8px;
        }

        .chat-display::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 4px;
        }

        .message {
            margin-bottom: 20px;
            padding: 16px;
            border-radius: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: rgba(0, 212, 255, 0.1);
            border-left: 3px solid var(--accent-primary);
        }

        .message.assistant {
            background: rgba(124, 58, 237, 0.1);
            border-left: 3px solid var(--accent-secondary);
        }

        .message-header {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .message-content {
            color: var(--text-primary);
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .message.loading .message-content {
            font-style: italic;
            color: var(--text-muted);
        }

        .no-messages {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Input area */
        .input-area {
            display: flex;
            gap: 12px;
            padding: 20px;
            background: rgba(18, 24, 38, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
        }

        .input-area textarea {
            flex: 1;
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 2px solid var(--border-subtle);
            border-radius: 12px;
            padding: 14px 18px;
            font-family: var(--font-mono);
            font-size: 0.95rem;
            line-height: 1.6;
            resize: none;
            transition: all 0.3s ease;
        }

        .input-area textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-area textarea::placeholder {
            color: var(--text-muted);
            font-style: italic;
        }

        .input-area button {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px 28px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px var(--accent-glow);
        }

        /* Code review section (simplified) */
        .code-review-section {
            padding: 30px;
            background: rgba(18, 24, 38, 0.4);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-subtle);
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .section-icon {
            font-size: 1.5rem;
        }

        h2 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        textarea#codeInput {
            width: 100%;
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 2px solid var(--border-subtle);
            border-radius: 12px;
            padding: 16px 20px;
            font-family: var(--font-mono);
            font-size: 0.95rem;
            line-height: 1.6;
            resize: vertical;
            min-height: 150px;
            margin-bottom: 16px;
        }

        textarea#codeInput:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .response {
            background: var(--bg-primary);
            border: 2px solid var(--border-subtle);
            border-left: 4px solid var(--accent-primary);
            border-radius: 12px;
            padding: 20px;
            margin-top: 16px;
            white-space: pre-wrap;
            line-height: 1.8;
            max-height: 400px;
            overflow-y: auto;
        }

        /* Mobile overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .sidebar-overlay.active {
            display: block;
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                width: 280px;
                z-index: 10;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .hamburger {
                display: block;
            }

            h1 {
                font-size: 1.3rem;
            }

            .language-switcher label {
                display: none;
            }

            .content-area {
                padding: 12px;
            }

            .input-area {
                padding: 12px;
            }

            .code-review-section {
                padding: 20px 12px;
            }
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        *:focus-visible {
            outline: 2px solid var(--accent-primary);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="UIController.closeSidebar()"></div>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3 data-i18n="ui.sessions.header">对话历史</h3>
                <button class="new-session-btn" onclick="SessionManager.createNewSession()" data-i18n="ui.sessions.newButton">
                    新建对话
                </button>
            </div>
            <div class="session-list-container">
                <div id="sessionList"></div>
            </div>
        </aside>

        <!-- Main content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <button class="hamburger" onclick="UIController.toggleSidebar()">☰</button>
                    <h1 data-i18n="ui.title">AI Agent 学习助手</h1>
                </div>
                <div class="language-switcher">
                    <label data-i18n="ui.language.label">语言</label>
                    <select id="languageSelect" onchange="switchLanguage()">
                        <option value="zh-CN" data-i18n="ui.language.chinese">中文</option>
                        <option value="en-US" data-i18n="ui.language.english">English</option>
                    </select>
                </div>
            </header>

            <!-- Chat area -->
            <div class="content-area">
                <div class="chat-display" id="chatMessagesDisplay"></div>

                <div class="input-area">
                    <textarea
                        id="chatInput"
                        rows="3"
                        placeholder="输入你的问题...（Enter 换行，Ctrl+Enter 发送）"
                        data-i18n="ui.chat.placeholder"
                        data-i18n-attr="placeholder"></textarea>
                    <button onclick="sendChat()" data-i18n="ui.chat.sendButton">发送</button>
                </div>
            </div>

            <!-- Code review section -->
            <div class="code-review-section">
                <div class="section-header">
                    <span class="section-icon">🔍</span>
                    <h2 data-i18n="ui.codereview.header">代码审查</h2>
                </div>
                <textarea
                    id="codeInput"
                    placeholder="粘贴你的 Java 代码..."
                    data-i18n="ui.codereview.placeholder"
                    data-i18n-attr="placeholder"></textarea>
                <button onclick="reviewCode()" data-i18n="ui.codereview.reviewButton">审查代码</button>
                <div id="codeResponse" class="response" style="display:none;"></div>
            </div>
        </main>
    </div>

    <script src="/js/i18n.js"></script>
    <script src="/js/uiController.js"></script>
    <script src="/js/sessionManager.js"></script>
    <script>
        // Initialize application
        document.addEventListener('DOMContentLoaded', async function() {
            // Initialize i18n
            const currentLocale = I18n.init();
            document.getElementById('languageSelect').value = currentLocale;
            I18n.updatePageTranslations();

            // Initialize session manager
            await SessionManager.init();

            // Keyboard shortcuts
            const chatInput = document.getElementById('chatInput');
            const codeInput = document.getElementById('codeInput');

            chatInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    sendChat();
                }
            });

            codeInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    reviewCode();
                }
            });
        });

        function switchLanguage() {
            const newLocale = document.getElementById('languageSelect').value;
            I18n.setLocale(newLocale);
            I18n.updatePageTranslations();
            document.title = I18n.translate('ui.title');
            SessionManager.renderSessionList(); // Re-render to update time labels
        }

        async function sendChat() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();

            if (!message) {
                alert(I18n.translate('ui.alert.emptyQuestion'));
                return;
            }

            const sessionId = SessionManager.getCurrentSessionId();
            if (!sessionId) {
                alert('请先创建一个会话');
                return;
            }

            // Show user message immediately
            UIController.appendMessage('USER', message);
            UIController.showChatLoading();

            // Clear input
            input.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept-Language': I18n.getLocale()
                    },
                    body: JSON.stringify({
                        sessionId: sessionId,
                        message: message
                    })
                });

                const data = await response.json();
                UIController.hideChatLoading();
                UIController.appendMessage('ASSISTANT', data.response);

                // Refresh session list to update title and time
                await SessionManager.refreshSessions();
            } catch (error) {
                UIController.hideChatLoading();
                UIController.appendMessage('ASSISTANT', I18n.translate('ui.chat.error') + error.message);
            }
        }

        async function reviewCode() {
            const input = document.getElementById('codeInput');
            const responseDiv = document.getElementById('codeResponse');

            const code = input.value.trim();
            if (!code) {
                alert(I18n.translate('ui.alert.emptyCode'));
                return;
            }

            responseDiv.style.display = 'block';
            responseDiv.textContent = I18n.translate('ui.codereview.analyzing');

            try {
                const response = await fetch('/api/code/review', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept-Language': I18n.getLocale()
                    },
                    body: JSON.stringify({
                        code: code,
                        language: 'java'
                    })
                });

                const data = await response.json();
                responseDiv.textContent = data.feedback;
            } catch (error) {
                responseDiv.textContent = I18n.translate('ui.codereview.error') + error.message;
            }
        }
    </script>
</body>
</html>
